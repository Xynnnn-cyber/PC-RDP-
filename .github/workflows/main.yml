name: PC-RDP-ULTRA-OPTIMIZED

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:
      - name: 1. Maximize CPU & Disable Security
        run: |
          # Prioridad máxima al procesador para aplicaciones
          reg add "HKEY_LOCAL_MACHINE\System\CurrentControlSet\Control\PriorityControl" /v Win32PrioritySeparation /t REG_DWORD /d 38 /f
          
          # Desactivar Windows Defender (Ahorra mucha CPU y RAM)
          Set-MpPreference -DisableRealtimeMonitoring $true
          
          # Desactivar UAC y restricciones de Admin
          reg add "HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System" /v ConsentPromptBehaviorAdmin /t REG_DWORD /d 0 /f
          reg add "HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System" /v EnableLUA /t REG_DWORD /d 0 /f

      - name: 2. Ghost Windows (Optimization)
        run: |
          # Quitar todos los efectos visuales (Parecerá Windows clásico pero vuela)
          reg add "HKEY_CURRENT_USER\Software\Microsoft\Windows\CurrentVersion\Explorer\VisualEffects" /v VisualFXSetting /t REG_DWORD /d 2 /f
          
          # Habilitar RDP sin autenticación de red (Más rápido)
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          
          # Abrir Firewall total
          netsh advfirewall set allprofiles state off

      - name: 3. Create God-Mode User
        run: |
          $user = "RDP"
          $pass = "Admin12345!"
          net user $user $pass /add /expires:never
          net localgroup Administrators $user /add
          echo "USER_PASS=$pass" >> $env:GITHUB_ENV

      - name: 4. Tailscale Fast-Connect
        run: |
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          Invoke-WebRequest -Uri $tsUrl -OutFile "ts.msi"
          Start-Process msiexec.exe -ArgumentList "/i", "ts.msi", "/quiet", "/norestart" -Wait
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-gaming-pc
          $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
          echo "TS_IP=$tsIP" >> $env:GITHUB_ENV

      - name: 5. Final Details
        run: |
          Write-Host "`n========================================"
          Write-Host "IP: $env:TS_IP"
          Write-Host "USER: RDP"
          Write-Host "PASS: Admin12345!"
          Write-Host "========================================`n"
          while ($true) { Start-Sleep -Seconds 300 }
